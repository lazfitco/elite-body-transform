<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Body Transform</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
    text-align: center;
}

.container {
    padding: 40px;
}

button {
    background: red;
    color: white;
    border: none;
    padding: 10px 20px;
    margin: 10px;
    cursor: pointer;
    font-weight: bold;
}

a {
    color: red;
    text-decoration: none;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h1 id="title">Elite Body Transform</h1>

<p id="description">
Transform your body with personalized training plans.
</p>

<button onclick="setLanguage('en')">English</button>
<button onclick="setLanguage('es')">Español</button>

<p>
<a href="https://instagram.com/lazfit_775" target="_blank">
Follow me on Instagram
</a>
</p>

</div>

<script>
function setLanguage(lang) {
    if (lang === 'es') {
        document.getElementById("title").innerText = "Transformación Corporal Elite";
        document.getElementById("description").innerText = "Transforma tu cuerpo con planes personalizados.";
    } else {
        document.getElementById("title").innerText = "Elite Body Transform";
        document.getElementById("description").innerText = "Transform your body with personalized training plans.";
    }
}
</script>

</body>
</html>
